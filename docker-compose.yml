version: "3.9"

services:

  mariadb:
    image: mariadb:11
    container_name: college-db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    networks:
      - college-net

  backend:
    build: .
    container_name: college-app
    restart: always
    env_file:
      - .env
    depends_on:
      - mariadb
    ports:
      - "3000:3000"
    networks:
      - college-net

volumes:
  db_data:

networks:
  college-net:
    driver: bridge
