apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: duniversity-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Asadkhanrtx/Duniversity-College-Portal.git
    targetRevision: master
    path: helm-duniversity

  destination:
    server: https://kubernetes.default.svc
    namespace: gateway-ns

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
